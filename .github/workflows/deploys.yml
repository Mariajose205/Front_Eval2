name: Deploy Frontend to AWS EC2

on:
  push:
    branches: [ "deploy" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest

  deploy-to-aws:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST_FRONT }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Detener y eliminar contenedor anterior si existe
            docker stop innovatech-web || true
            docker rm innovatech-web || true
            
            # Limpiar imágenes colgadas
            docker image prune -f
            
            # Descargar la nueva versión de la interfaz
            docker pull ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest
            
            # Levantar el Frontend exponiendo el puerto 80 hacia el mundo exterior
            docker run -d --name innovatech-web \
              -p 80:5000 \
              -e BACKEND_URL=${{ secrets.BACKEND_URL }} \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest